---
# Semantic release: on push to main, compute next version from conventional commits,
# create tag and GitHub release, then build and publish binaries + Docker image.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: go-semantic-release
        id: semrel
        uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          changelog-file: CHANGELOG.md
          force-bump-patch-version: true

      - name: Fetch tags
        if: steps.semrel.outputs.version != ''
        run: git fetch --tags origin

      - name: Set up Go
        if: steps.semrel.outputs.version != ''
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Clean working tree for GoReleaser
        if: steps.semrel.outputs.version != ''
        run: |
          git clean -fd
          git checkout -- .

      - name: Run GoReleaser
        if: steps.semrel.outputs.version != ''
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.semrel.outputs.version != ''
        uses: docker/setup-buildx-action@v3

      - name: Set image name (GHCR, lowercase)
        if: steps.semrel.outputs.version != ''
        id: image
        run: echo "name=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: steps.semrel.outputs.version != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (release)
        if: steps.semrel.outputs.version != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:v${{ steps.semrel.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
          build-args: |
            LDFLAGS=-ldflags "-s -w"
          cache-from: type=gha
          cache-to: type=gha,mode=max
