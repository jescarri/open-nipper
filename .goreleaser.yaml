# GoReleaser config: binaries + Docker image for semantic-release tags.
# Requires CGO for sqlite; linux/amd64 is native on the runner; arm64 needs cross-compiler.
version: 2

builds:
  - id: nipper
    main: ./cmd/nipper
    binary: nipper
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

release:
  github: {}
  name_template: "v{{ .Version }}"
  draft: false
